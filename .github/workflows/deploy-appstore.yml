name: Build & Deploy to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  XCODE_VERSION: "15.4"
  SCHEME: "Schedulo2"
  BUNDLE_ID: "com.schedulo2.ios"

jobs:
  build-and-deploy:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build KMP shared framework for iOS
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Decode GoogleService-Info.plist
        run: echo "$GOOGLE_SERVICE_PLIST_B64" | base64 -d > iosApp/Schedulo2/GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_PLIST_BASE64 }}

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      - name: Install Apple certificate and provisioning profile
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode files
          echo "$P12_CERTIFICATE_BASE64" | base64 -d > "$CERTIFICATE_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > "$PROFILE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate to keychain
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | grep -A1 UUID | grep string | \
            sed 's/.*<string>\(.*\)<\/string>/\1/')
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      - name: Build archive
        working-directory: iosApp
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_TEAM_ID }}
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          xcodebuild archive \
            -project Schedulo2.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Schedulo2.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty

      - name: Prepare ExportOptions.plist
        env:
          DEVELOPMENT_TEAM: ${{ secrets.IOS_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          sed -i '' "s/\$(DEVELOPMENT_TEAM)/$DEVELOPMENT_TEAM/g" iosApp/ExportOptions.plist
          sed -i '' "s/\$(PROVISIONING_PROFILE_NAME)/$PROVISIONING_PROFILE_NAME/g" iosApp/ExportOptions.plist

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Schedulo2.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist iosApp/ExportOptions.plist

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: ${{ runner.temp }}/export/Schedulo2.ipa

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.IOS_APPSTORE_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.IOS_APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.IOS_APPSTORE_API_KEY_P8_BASE64 }}
        run: |
          # Decode API key
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 -d > ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          # Upload using altool
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/Schedulo2.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
